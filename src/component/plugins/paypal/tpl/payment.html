{% extends 'struct.html' %}

{% block content %}
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-xl-8">
      <div class="card custom-card mb-4">
        <div class="card-header">
          <div class="d-flex align-items-center">
            <div class="me-3">
              <span class="avatar avatar-md avatar-rounded bg-primary">
                <i class="bi bi-paypal fs-20"></i>
              </span>
            </div>
            <div>
              <h4 class="fw-semibold mb-1">Пополнение через PayPal</h4>
              <p class="text-muted mb-0 fs-12">Введите сумму и перейдите к оплате</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card custom-card">
        <div class="card-body">
          <form id="paypalPaymentForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Сумма</label>
              <div class="input-group input-group-lg">
                <input type="number" class="form-control" id="amount" name="amount" value="{{ defaultAmount }}" step="1" required>
                <span class="input-group-text">Donate Coin</span>
              </div>
              <small class="text-muted d-block mt-2">
                Минимум: {{ minAmount }}, максимум: {{ maxAmount }}
              </small>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg" id="payButton">
                <i class="bi bi-arrow-right-circle me-2"></i>
                Перейти к оплате
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block js %}
<script>
$(function() {
  $('#paypalPaymentForm').on('submit', function(e) {
    e.preventDefault();

    const $btn = $('#payButton');
    const original = $btn.html();
    $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Создание платежа...');

    AjaxSend('/paypal/payment/create', 'POST', $(this).serialize(), false)
      .then(function(response) {
        if (response && response.url) {
          window.location.href = response.url;
          return;
        }

        if (response && response.message) {
          showError(response.message);
        } else {
          showError('Неизвестная ошибка при создании платежа');
        }

        $btn.prop('disabled', false).html(original);
      })
      .catch(function(error) {
        if (error && error.message) {
          showError(error.message);
        } else {
          showError('Ошибка соединения');
        }
        $btn.prop('disabled', false).html(original);
      });
  });
});
</script>
{% endblock %}
