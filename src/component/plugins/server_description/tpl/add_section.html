{% extends 'struct.html' %}

{% block title %}{{ phrase('Add New Section') }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mt-3">
        <div class="col-xl-12">
            <div class="card custom-card">
                <div class="card-header justify-content-between">
                    <div class="card-title">
                        <a href="/admin/plugin/server_description" class="btn btn-sm btn-light me-2">
                           <i class="fe fe-arrow-left"></i>
                        </a>
                        {{ phrase('Add New Section') }}
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">{{ phrase('Category') }} *</label>
                                <select class="form-control" id="category-select">
                                    <option value="">{{ phrase('Select a category') }}</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            {% for lang in languages %}
                            <div class="mb-3">
                                <label class="form-label d-flex align-items-center">
                                    <img src="/uploads/images/flags/{{ lang.getLang() }}.png" class="me-2" style="width: 20px;" alt="{{ lang.getLang() }}">
                                    {{ phrase('Section Name') }} ({{ lang.getName() }})
                                </label>
                                <input type="text" class="form-control section-name-input" data-lang="{{ lang.getLang() }}" placeholder="{{ phrase('Enter name in') }} {{ lang.getName() }}">
                            </div>
                            {% endfor %}
                            
                            <div class="mt-4">
                                <button type="button" class="btn btn-primary" id="create_section_btn">
                                    <i class="fe fe-plus"></i> {{ phrase('Create Section') }}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
$(document).ready(function() {
    $('#create_section_btn').on('click', function() {
        const categoryId = $('#category-select').val();
        const names = {};
        
        if (!categoryId) {
            toastr.error('{{ phrase("Category is required") }}');
            return;
        }
        
        $('.section-name-input').each(function() {
            const lang = $(this).data('lang');
            const val = $(this).val();
            if (val) {
                names[lang] = val;
            }
        });

        if (Object.keys(names).length === 0) {
            toastr.error('{{ phrase("Please enter at least one section name") }}');
            return;
        }

        AjaxSend('/admin/plugin/server_description/add', 'POST', { names: names, categoryId: categoryId }, true).then(res => {
            if (res.redirect) {
                window.location.href = res.redirect;
            }
        });
    });
});
</script>
{% endblock %}
